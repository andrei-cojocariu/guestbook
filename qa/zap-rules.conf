# ZAP baseline rule-promotion config (guestbook2 DAST gate, pipeline v3.0.0).
# Promotes missing-security-header / insecure-cookie passive rules from the
# ZAP default of WARN to FAIL so the "zero FAIL" threshold is enforceable
# (a bare zap-baseline.py leaves every passive rule at WARN => untrippable).
# Structural, scan-origin, and framework-artifact warnings documented at
# certification time are set to IGNORE with rationale.
#
# Format: <ruleId>\t<action>\t(<name>)   action in IGNORE|INFO|WARN|FAIL
#
# --- Security headers promoted to FAIL (clean app ships all of these) -------
10038	FAIL	(Content Security Policy (CSP) Header Not Set)
10021	FAIL	(X-Content-Type-Options Header Missing)
10020	FAIL	(Missing Anti-clickjacking Header)
10063	FAIL	(Permissions Policy Header Not Set)
10037	FAIL	(Server Leaks Version Information via Server HTTP Response Header)
10035	FAIL	(Strict-Transport-Security Header Not Set)
# --- Cookie flags promoted to FAIL (clean CSRF cookie is HttpOnly+SameSite) --
10010	FAIL	(Cookie No HttpOnly Flag)
10011	FAIL	(Cookie Without Secure Flag)
10054	FAIL	(Cookie Without SameSite Attribute)
# --- Informational "identified" tags (not vulnerabilities; non-deterministic) -
10111	IGNORE	(Authentication Request Identified - informational)
10112	IGNORE	(Session Management Response Identified - informational)
10113	IGNORE	(Verification Request Identified - informational)
# --- Documented waivers (rationale in certification/RELEASE-AUDIT-*) ---------
10017	IGNORE	(Cross-Domain JS Source File Inclusion - scan-origin artifact: app emits its own baseURL)
10049	IGNORE	(Non-Storable Content - informational cache classification)
10055	IGNORE	(CSP Failure to Define Directive with No Fallback - explicit directives set)
90003	IGNORE	(Sub Resource Integrity Attribute Missing - self-hosted assets, N/A)
90004	IGNORE	(Cross-Origin-Embedder-Policy Header Missing - N/A for this app)
