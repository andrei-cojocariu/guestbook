project_name: guestbook
root_dir: .
stack: php-codeigniter-3.1.5
default_branch: master

# Transitional baseline manifest (per .ptah/audit/standards.md — every rule is
# `Pending`). php (XAMPP) and composer are on PATH; phpunit/phpstan/php-cs-fixer are
# NOT yet installed. Hooks do real work where the tool exists (composer, php -l) and
# stub gracefully (exit 0, labeled PENDING) where it does not — so the pipeline can
# run without faking a pass. The devops freeze (tsk-002) replaces these stubs with a
# php5.6 container that carries the real test/analysis tooling, and hooks run inside it.
hooks:
  build: composer install --no-interaction --no-dev --no-progress
  lint: for f in $(find application -name "*.php" -not -path "*/tests/*"); do php -l "$f" >/dev/null || exit 1; done; echo "php -l: syntax OK"
  test: if [ -x vendor/bin/phpunit ]; then php vendor/bin/phpunit; else echo "phpunit PENDING — characterization suite lands with tsk-002/tsk-003"; fi
  analyze: if command -v phpstan >/dev/null 2>&1; then phpstan analyse application --level=4; else echo "phpstan PENDING — standards.md targets PHPStan L4"; fi
